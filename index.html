<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame Scene</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>

      <!-- SKY -->
      <a-sky color="#87CEEB"></a-sky>

      <!-- GROUND -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#228B22"></a-plane>

      <!-- ===== TABLE ===== -->
      <!-- Table top -->
      <a-box position="0 1.0 0" width="2" height="0.1" depth="1" color="#8B4513"></a-box>
      <!-- Table legs -->
      <a-cylinder position="-0.8 0.5 -0.4" radius="0.05" height="1" color="#6B3310"></a-cylinder>
      <a-cylinder position=" 0.8 0.5 -0.4" radius="0.05" height="1" color="#6B3310"></a-cylinder>
      <a-cylinder position="-0.8 0.5  0.4" radius="0.05" height="1" color="#6B3310"></a-cylinder>
      <a-cylinder position=" 0.8 0.5  0.4" radius="0.05" height="1" color="#6B3310"></a-cylinder>

      <!-- ===== CHAIR 1 — FRONT ===== -->
      <!-- Seat -->
      <a-box position="0 0.6 1.0" width="0.6" height="0.08" depth="0.6" color="#A0522D"></a-box>
      <!-- Backrest -->
      <a-box position="0 1.0 1.28" width="0.6" height="0.6" depth="0.08" color="#A0522D"></a-box>
      <!-- Legs -->
      <a-cylinder position="-0.25 0.3 0.75" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>
      <a-cylinder position=" 0.25 0.3 0.75" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>
      <a-cylinder position="-0.25 0.3 1.25" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>
      <a-cylinder position=" 0.25 0.3 1.25" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>

      <!-- ===== CHAIR 2 — BACK ===== -->
      <!-- Seat -->
      <a-box position="0 0.6 -1.0" width="0.6" height="0.08" depth="0.6" color="#A0522D"></a-box>
      <!-- Backrest -->
      <a-box position="0 1.0 -1.28" width="0.6" height="0.6" depth="0.08" color="#A0522D"></a-box>
      <!-- Legs -->
      <a-cylinder position="-0.25 0.3 -0.75" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>
      <a-cylinder position=" 0.25 0.3 -0.75" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>
      <a-cylinder position="-0.25 0.3 -1.25" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>
      <a-cylinder position=" 0.25 0.3 -1.25" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>

      <!-- ===== CHAIR 3 — LEFT ===== -->
      <!-- Seat -->
      <a-box position="-1.2 0.6 0" width="0.6" height="0.08" depth="0.6" color="#A0522D"></a-box>
      <!-- Backrest (faces left/outward) -->
      <a-box position="-1.48 1.0 0" width="0.08" height="0.6" depth="0.6" color="#A0522D"></a-box>
      <!-- Legs -->
      <a-cylinder position="-0.95 0.3 -0.25" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>
      <a-cylinder position="-0.95 0.3  0.25" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>
      <a-cylinder position="-1.45 0.3 -0.25" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>
      <a-cylinder position="-1.45 0.3  0.25" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>

      <!-- ===== CHAIR 4 — RIGHT ===== -->
      <!-- Seat -->
      <a-box position="1.2 0.6 0" width="0.6" height="0.08" depth="0.6" color="#A0522D"></a-box>
      <!-- Backrest (faces right/outward) -->
      <a-box position="1.48 1.0 0" width="0.08" height="0.6" depth="0.6" color="#A0522D"></a-box>
      <!-- Legs -->
      <a-cylinder position="0.95 0.3 -0.25" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>
      <a-cylinder position="0.95 0.3  0.25" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>
      <a-cylinder position="1.45 0.3 -0.25" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>
      <a-cylinder position="1.45 0.3  0.25" radius="0.03" height="0.6" color="#7B3A1E"></a-cylinder>

      <!-- ===== MILO TIN (on table) ===== -->
      <!-- Green body -->
      <a-cylinder position="-0.5 1.2 0" radius="0.1" height="0.3" color="#1B5E20"></a-cylinder>
      <!-- Yellow label band -->
      <a-cylinder position="-0.5 1.2 0" radius="0.101" height="0.12" color="#F9A825"></a-cylinder>
      <!-- Dark lid -->
      <a-cylinder position="-0.5 1.36 0" radius="0.105" height="0.04" color="#111111"></a-cylinder>
      <!-- Dark bottom -->
      <a-cylinder position="-0.5 1.06 0" radius="0.105" height="0.04" color="#111111"></a-cylinder>

      <!-- ===== IDEAL MILK TIN (on table) ===== -->
      <!-- Silver/white body -->
      <a-cylinder position="0.5 1.2 0" radius="0.1" height="0.28" color="#ECEFF1"></a-cylinder>
      <!-- Blue stripe 1 -->
      <a-cylinder position="0.5 1.10 0" radius="0.102" height="0.055" color="#1565C0"></a-cylinder>
      <!-- Blue stripe 2 -->
      <a-cylinder position="0.5 1.20 0" radius="0.102" height="0.055" color="#1565C0"></a-cylinder>
      <!-- Blue stripe 3 -->
      <a-cylinder position="0.5 1.30 0" radius="0.102" height="0.055" color="#1565C0"></a-cylinder>
      <!-- Silver lid -->
      <a-cylinder position="0.5 1.35 0" radius="0.105" height="0.04" color="#90A4AE"></a-cylinder>
      <!-- Silver bottom -->
      <a-cylinder position="0.5 1.07 0" radius="0.105" height="0.04" color="#90A4AE"></a-cylinder>

      <!-- ===== CUP 1 (on table) ===== -->
      <a-cylinder position="-0.2 1.12 0.3" radius="0.06" height="0.14" color="#E53935" open-ended="true" side="double"></a-cylinder>
      <a-cylinder position="-0.2 1.06 0.3" radius="0.06" height="0.01" color="#E53935"></a-cylinder>
      <!-- Saucer -->
      <a-cylinder position="-0.2 1.055 0.3" radius="0.09" height="0.01" color="#FAFAFA"></a-cylinder>

      <!-- ===== CUP 2 (on table) ===== -->
      <a-cylinder position="0.2 1.12 0.3" radius="0.06" height="0.14" color="#1565C0" open-ended="true" side="double"></a-cylinder>
      <a-cylinder position="0.2 1.06 0.3" radius="0.06" height="0.01" color="#1565C0"></a-cylinder>
      <!-- Saucer -->
      <a-cylinder position="0.2 1.055 0.3" radius="0.09" height="0.01" color="#FAFAFA"></a-cylinder>

      <!-- ===== GAZEBO WALLS ===== -->
      <a-box position="-3  2 -1" width="0.2" height="4" depth="4"  color="#4CAF50"></a-box>
      <a-box position=" 3  2 -1" width="0.2" height="4" depth="4"  color="#4CAF50"></a-box>
      <a-box position="0   2 -3" width="6"   height="4" depth="0.2" color="#388E3C"></a-box>

      <!-- Gazebo roof -->
      <a-cone position="0 4.5 -1" radius-bottom="4" radius-top="0.2" height="2" color="#2E7D32"></a-cone>

      <!-- Gazebo floor -->
      <a-cylinder position="0 0.02 -1" radius="3.5" height="0.04" color="#D7CCC8"></a-cylinder>

      <!-- ===== TREES ===== -->
      <!-- Tree 1 -->
      <a-cylinder position="-6 1 -3" radius="0.2" height="2" color="#5D4037"></a-cylinder>
      <a-sphere   position="-6 3 -3" radius="1.2" color="#2E7D32"></a-sphere>
      <!-- Tree 2 -->
      <a-cylinder position="6 1.2 -3" radius="0.2" height="2.4" color="#4E342E"></a-cylinder>
      <a-sphere   position="6 3.4 -3" radius="1.4" color="#388E3C"></a-sphere>
      <!-- Tree 3 -->
      <a-cylinder position="-5 1.5 -8" radius="0.22" height="3" color="#5D4037"></a-cylinder>
      <a-sphere   position="-5 4.2 -8" radius="1.5" color="#1B5E20"></a-sphere>

      <!-- ===== FLOWER POT (decoration) ===== -->
      <a-cylinder position="3.5 0.2 0" radius="0.2" height="0.4" color="#8D4004"></a-cylinder>
      <a-sphere   position="3.5 0.6 0" radius="0.3" color="#388E3C"></a-sphere>
      <a-sphere   position="3.6 0.7 0.1" radius="0.1" color="#E91E63"></a-sphere>
      <a-sphere   position="3.4 0.75 0" radius="0.09" color="#FFEB3B"></a-sphere>

      <a-cylinder position="-3.5 0.2 0" radius="0.2" height="0.4" color="#8D4004"></a-cylinder>
      <a-sphere   position="-3.5 0.6 0" radius="0.3" color="#2E7D32"></a-sphere>
      <a-sphere   position="-3.4 0.7 0.1" radius="0.1" color="#FF5722"></a-sphere>
      <a-sphere   position="-3.6 0.72 0" radius="0.09" color="#9C27B0"></a-sphere>

      <!-- ===== CAMERA ===== -->
      <a-entity camera look-controls wasd-controls position="0 1.6 4"></a-entity>

    </a-scene>
  </body>
</html>
